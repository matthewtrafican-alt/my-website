<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>HR Business Partner — Training Architecture Plan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:#060a16;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;}

/* ── Header ── */
.top-bar{background:#0b1221;border-bottom:1px solid #182035;padding:10px 20px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;}
.top-bar .back{font-size:.7rem;color:#64748b;text-decoration:none;display:flex;align-items:center;gap:5px;}
.top-bar .back:hover{color:#94a3b8;}
.top-bar h1{font-size:.9rem;font-weight:800;color:#e2e8f0;flex:1;}
.top-bar .badge{font-size:.62rem;font-weight:700;padding:3px 9px;border-radius:4px;background:rgba(96,165,250,.12);border:1px solid rgba(96,165,250,.2);color:#60a5fa;}

/* ── Tab bar ── */
.tab-bar{display:flex;gap:2px;padding:0 20px;background:#0b1221;border-bottom:1px solid #182035;}
.tab{padding:10px 18px;font-size:.72rem;font-weight:700;cursor:pointer;color:#475569;border-bottom:2px solid transparent;transition:all .15s;font-family:'Inter',sans-serif;background:none;border-top:none;border-left:none;border-right:none;}
.tab:hover{color:#94a3b8;}
.tab.at{color:#60a5fa;border-bottom-color:#60a5fa;}

/* ── Layout ── */
.main{display:flex;flex:1;overflow:hidden;height:calc(100vh - 89px);}

/* ── Sidebar ── */
.sidebar{width:240px;background:#080f1d;border-right:1px solid #182035;overflow-y:auto;flex-shrink:0;padding:12px 0;}
.sb-section{margin-bottom:4px;}
.sb-domain{padding:8px 14px;font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.1em;cursor:pointer;display:flex;align-items:center;gap:6px;user-select:none;}
.sb-domain .sb-chev{font-size:.7rem;color:#334155;transition:transform .2s;margin-left:auto;}
.sb-domain .sb-chev.open{transform:rotate(90deg);}
.sb-comps{padding-left:8px;display:none;}
.sb-comps.open{display:block;}
.sb-comp{padding:5px 14px;font-size:.68rem;color:#64748b;cursor:pointer;border-radius:4px;margin:1px 6px;display:flex;align-items:center;gap:6px;}
.sb-comp:hover{background:#0f1929;color:#94a3b8;}
.sb-comp.sel{background:rgba(59,130,246,.1);color:#60a5fa;}
.sb-tier{padding:4px 14px 4px 28px;font-size:.63rem;color:#334155;cursor:pointer;border-radius:4px;margin:1px 6px;}
.sb-tier:hover{background:#0f1929;color:#64748b;}
.sb-tier.sel{color:#93c5fd;}

/* ── Content ── */
.content{flex:1;overflow-y:auto;padding:20px;}

/* ── Domain block ── */
.domain-block{margin-bottom:24px;}
.domain-hdr{padding:10px 16px;border-radius:8px;font-size:.75rem;font-weight:800;text-transform:uppercase;letter-spacing:.12em;margin-bottom:12px;}

/* ── Competency block ── */
.comp-block{background:#0b1221;border:1px solid #182035;border-radius:10px;margin-bottom:12px;overflow:hidden;}
.comp-hdr{padding:14px 18px;border-bottom:1px solid #0e1929;}
.comp-name{font-size:.88rem;font-weight:800;color:#e2e8f0;margin-bottom:4px;}
.comp-desc{font-size:.7rem;color:#64748b;line-height:1.5;}
.comp-supporting{margin-top:8px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;}
.comp-supporting-lbl{font-size:.6rem;font-weight:700;color:#334155;text-transform:uppercase;letter-spacing:.08em;}
.comp-sup-chip{font-size:.6rem;padding:2px 8px;border-radius:3px;background:#080f1d;border:1px solid #182035;color:#475569;}

/* ── Tier block ── */
.tier-block{border-top:1px solid #0e1929;}
.tier-hdr{padding:12px 18px;display:flex;align-items:center;gap:12px;cursor:pointer;user-select:none;}
.tier-label{font-size:.8rem;font-weight:800;}
.tier-impact{font-size:.62rem;color:#475569;font-style:italic;margin-left:auto;}
.tier-chev{font-size:.85rem;color:#334155;transition:transform .2s;}
.tier-chev.open{transform:rotate(90deg);}
.tier-body{padding:0 18px 16px;display:none;}
.tier-body.open{display:block;}

/* ── Required Behaviors ── */
.req-behaviors{margin-bottom:12px;}
.rb-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;color:#334155;margin-bottom:6px;}
.rb-item{font-size:.7rem;color:#94a3b8;padding:5px 0 5px 16px;position:relative;line-height:1.5;border-bottom:1px solid #080f1d;}
.rb-item:last-child{border-bottom:none;}
.rb-item::before{content:counter(rb);counter-increment:rb;position:absolute;left:0;font-size:.6rem;font-weight:800;color:#334155;}
.req-behaviors{counter-reset:rb;}
.criteria-box{background:#080f1d;border-radius:6px;padding:8px 12px;margin-bottom:12px;}
.crit-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#334155;margin-bottom:3px;}
.crit-val{font-size:.68rem;color:#facc15;font-style:italic;}

/* ── Task table ── */
.task-table-wrap{overflow-x:auto;}
.task-table{width:100%;border-collapse:collapse;min-width:900px;font-size:.65rem;}
.task-table thead tr th{padding:6px 8px;text-align:center;font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#334155;background:#060a16;border:1px solid #0e1929;white-space:nowrap;}
.task-table thead tr:first-child th{background:#080f1d;font-size:.62rem;}
.task-table td{padding:6px 8px;border:1px solid #0e1929;vertical-align:middle;color:#94a3b8;}
.task-table td.task-num{color:#475569;font-weight:700;white-space:nowrap;text-align:center;}
.task-table td.task-stmt{text-align:left;min-width:200px;line-height:1.45;}
.task-table td.task-diff{text-align:center;}
.diff-1{color:#34d399;font-weight:700;}
.diff-2{color:#facc15;font-weight:700;}
.diff-3{color:#f87171;font-weight:700;}
.task-table td.ctx-cell{text-align:center;}
.ctx-icon{font-size:.75rem;cursor:default;}
.ctx-icon.off{opacity:.15;}
.prof-code{display:inline-block;width:24px;height:24px;border-radius:4px;font-size:.68rem;font-weight:800;text-align:center;line-height:24px;}
.pc-A{background:rgba(249,115,22,.15);color:#fb923c;}
.pc-B{background:rgba(234,179,8,.15);color:#facc15;}
.pc-C{background:rgba(52,211,153,.15);color:#34d399;}
.pc-star{background:rgba(59,130,246,.15);color:#60a5fa;}
.pc-dash{background:rgba(71,85,105,.1);color:#334155;}
.core-badge{font-size:.58rem;font-weight:700;padding:2px 5px;border-radius:3px;}
.core-Core{background:rgba(59,130,246,.15);color:#60a5fa;}
.core-Cert{background:rgba(168,85,247,.15);color:#c084fc;}
.core-Opt{background:rgba(71,85,105,.1);color:#475569;}

/* OJT cells */
.ojt-cell{text-align:center;padding:4px;}
.ojt-input{width:36px;background:#060a16;border:1px solid #182035;color:#94a3b8;font-size:.62rem;text-align:center;padding:3px;border-radius:3px;font-family:'Inter',sans-serif;}
.ojt-input:focus{outline:none;border-color:#3b82f6;color:#e2e8f0;}
.ojt-date{width:80px;background:#060a16;border:1px solid #182035;color:#94a3b8;font-size:.58rem;text-align:center;padding:3px;border-radius:3px;font-family:'Inter',sans-serif;}
.ojt-date:focus{outline:none;border-color:#3b82f6;}
.ojt-certified{background:rgba(52,211,153,.08);border-color:rgba(52,211,153,.2)!important;}

/* ── E&T Plan tab ── */
.etp-section{background:#0b1221;border:1px solid #182035;border-radius:10px;padding:18px;margin-bottom:14px;}
.etp-sec-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:#334155;margin-bottom:12px;}
.career-path{display:flex;align-items:center;gap:0;margin-bottom:12px;}
.cp-tier{flex:1;text-align:center;padding:14px 10px;position:relative;}
.cp-tier::after{content:'→';position:absolute;right:-8px;top:50%;transform:translateY(-50%);color:#1e3058;font-size:1rem;}
.cp-tier:last-child::after{display:none;}
.cp-tier-name{font-size:.75rem;font-weight:800;margin-bottom:4px;}
.cp-tier-desc{font-size:.62rem;color:#64748b;line-height:1.4;}
.cp-tier-impact{font-size:.58rem;color:#334155;margin-top:5px;font-style:italic;}
.cp-basic{background:rgba(249,115,22,.07);border:1px solid rgba(249,115,22,.2);border-radius:8px;}
.cp-basic .cp-tier-name{color:#fb923c;}
.cp-prac{background:rgba(234,179,8,.07);border:1px solid rgba(234,179,8,.2);border-radius:8px;}
.cp-prac .cp-tier-name{color:#facc15;}
.cp-exp{background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.2);border-radius:8px;}
.cp-exp .cp-tier-name{color:#60a5fa;}
.cp-master{background:rgba(139,92,246,.07);border:1px solid rgba(139,92,246,.2);border-radius:8px;}
.cp-master .cp-tier-name{color:#a78bfa;}

.pathway-row{display:grid;grid-template-columns:140px 1fr 1fr;gap:12px;margin-bottom:8px;align-items:start;}
.pw-lbl{font-size:.68rem;font-weight:700;color:#94a3b8;padding-top:3px;}
.pw-track{background:#080f1d;border-radius:6px;padding:10px 12px;}
.pw-track-name{font-size:.7rem;font-weight:700;margin-bottom:5px;}
.pw-track.initial .pw-track-name{color:#34d399;}
.pw-track.lateral .pw-track-name{color:#f472b6;}
.pw-track ul{list-style:none;padding:0;}
.pw-track ul li{font-size:.65rem;color:#64748b;padding:2px 0 2px 12px;position:relative;line-height:1.4;}
.pw-track ul li::before{content:'→';position:absolute;left:0;color:#334155;font-size:.58rem;}

.col-obj-list{width:100%;}
.col-row{display:grid;grid-template-columns:80px 1fr 90px 90px 90px;gap:8px;padding:6px 0;border-bottom:1px solid #0e1929;font-size:.68rem;align-items:start;}
.col-row:last-child{border-bottom:none;}
.col-row.col-hdr{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#334155;}
.col-id{color:#475569;font-weight:700;}
.col-obj{color:#94a3b8;line-height:1.45;}
.col-tier{text-align:center;}
.col-setting{text-align:center;font-size:.62rem;}
.col-gap{text-align:center;}
.setting-school{color:#60a5fa;}
.setting-ojt{color:#34d399;}
.setting-self{color:#a78bfa;}
.gap-badge{font-size:.58rem;font-weight:700;padding:2px 6px;border-radius:3px;}
.gap-y{background:rgba(239,68,68,.12);color:#f87171;}
.gap-n{background:rgba(52,211,153,.1);color:#34d399;}

.constraint-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
.constraint-card{background:#080f1d;border:1px solid #0e1929;border-radius:8px;padding:12px;}
.constraint-card h5{font-size:.72rem;font-weight:700;color:#e2e8f0;margin-bottom:6px;}
.constraint-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #060a16;font-size:.68rem;color:#94a3b8;}
.constraint-item:last-child{border-bottom:none;}
.constraint-item .ci-lbl{flex:1;}
.constraint-sel{background:#060a16;border:1px solid #182035;color:#94a3b8;font-size:.62rem;border-radius:4px;padding:3px 6px;font-family:'Inter',sans-serif;}

/* ── Individual tracking tab ── */
.track-controls{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.track-sel{background:#0b1221;border:1px solid #182035;color:#e2e8f0;font-size:.72rem;padding:6px 10px;border-radius:6px;font-family:'Inter',sans-serif;}
.track-sel:focus{outline:none;border-color:#3b82f6;}
.track-summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.ts-card{background:#0b1221;border:1px solid #182035;border-radius:8px;padding:14px;text-align:center;}
.ts-num{font-size:1.8rem;font-weight:900;line-height:1;margin-bottom:4px;}
.ts-lbl{font-size:.62rem;color:#475569;text-transform:uppercase;letter-spacing:.07em;}
.cert-progress-wrap{background:#0b1221;border:1px solid #182035;border-radius:10px;padding:16px;}
.cert-comp-row{border-bottom:1px solid #0e1929;padding:10px 0;}
.cert-comp-row:last-child{border-bottom:none;}
.cert-comp-name{font-size:.75rem;font-weight:700;color:#e2e8f0;margin-bottom:6px;}
.cert-tier-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:.68rem;}
.cert-tier-name{width:80px;color:#64748b;}
.cert-bar-wrap{flex:1;height:5px;background:#0e1929;border-radius:2px;}
.cert-bar{height:5px;border-radius:2px;transition:width .3s;}
.cert-pct{width:30px;text-align:right;font-size:.62rem;font-weight:700;color:#64748b;}

/* ── Credential panel ── */
.cred-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.cred-card{background:#080f1d;border:1px solid #0e1929;border-radius:8px;padding:12px;}
.cred-card h5{font-size:.72rem;font-weight:700;margin-bottom:4px;}
.cred-card p{font-size:.63rem;color:#475569;line-height:1.45;}
.cred-tier-badges{display:flex;gap:4px;margin-top:8px;flex-wrap:wrap;}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#182035;border-radius:2px;}

/* ── Proficiency Rubric ── */
.rubric-wrap{margin-bottom:14px;background:#0b1221;border:1px solid #182035;border-radius:10px;overflow:hidden;}
.rubric-toggle{display:flex;align-items:center;gap:10px;padding:12px 16px;cursor:pointer;user-select:none;}
.rubric-toggle h5{font-size:.78rem;font-weight:700;color:#e2e8f0;flex:1;}
.rubric-toggle .rt-chev{font-size:.85rem;color:#334155;transition:transform .2s;}
.rubric-toggle .rt-chev.open{transform:rotate(90deg);}
.rubric-body{display:none;padding:0 16px 16px;}
.rubric-body.open{display:block;}
.rubric-table{width:100%;border-collapse:collapse;min-width:600px;}
.rubric-table th{font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:7px 10px;text-align:center;border:1px solid #0e1929;}
.rubric-table th.crit-col{text-align:left;color:#475569;}
.rubric-table td{font-size:.67rem;padding:8px 10px;border:1px solid #0e1929;color:#94a3b8;line-height:1.45;vertical-align:top;}
.rubric-table td.crit-name{color:#e2e8f0;font-weight:600;white-space:nowrap;}
.th-foundation{color:#fb923c;background:rgba(249,115,22,.06);}
.th-practitioner{color:#facc15;background:rgba(234,179,8,.06);}
.th-expert{color:#60a5fa;background:rgba(59,130,246,.06);}
.th-master{color:#a78bfa;background:rgba(139,92,246,.06);}
.td-f{background:rgba(249,115,22,.04);}
.td-p{background:rgba(234,179,8,.04);}
.td-e{background:rgba(59,130,246,.04);}
.td-m{background:rgba(139,92,246,.04);}

/* ── Onboarding tab ── */
.emp-setup{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
.emp-field{background:#0b1221;border:1px solid #182035;border-radius:8px;padding:12px;}
.emp-field label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#334155;display:block;margin-bottom:5px;}
.emp-field input,.emp-field select{width:100%;background:#060a16;border:1px solid #182035;color:#e2e8f0;font-size:.72rem;padding:6px 8px;border-radius:5px;font-family:'Inter',sans-serif;}
.emp-field input:focus,.emp-field select:focus{outline:none;border-color:#3b82f6;}
.emp-select-wrap{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.emp-select-wrap label{font-size:.7rem;color:#64748b;white-space:nowrap;}

/* Timeline */
.ttp-wrap{background:#0b1221;border:1px solid #182035;border-radius:10px;padding:16px;margin-bottom:14px;}
.ttp-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.ttp-hdr h5{font-size:.8rem;font-weight:700;color:#e2e8f0;flex:1;}
.ttp-stat{font-size:.68rem;font-weight:700;}
.ttp-track{position:relative;height:36px;margin:0 0 8px;}
.ttp-bar-bg{position:absolute;top:13px;left:0;right:0;height:10px;background:#0e1929;border-radius:5px;}
.ttp-bar-plan{position:absolute;top:13px;left:0;height:10px;border-radius:5px;background:linear-gradient(to right,rgba(59,130,246,.3),rgba(59,130,246,.5));transition:width .4s;}
.ttp-bar-actual{position:absolute;top:13px;left:0;height:10px;border-radius:5px;background:linear-gradient(to right,#34d399,#22d3ee);transition:width .4s;}
.ttp-milestones{display:flex;position:relative;margin-top:6px;}
.ttp-milestone{position:absolute;transform:translateX(-50%);text-align:center;}
.ttp-m-tick{width:1px;height:8px;background:#182035;margin:0 auto 2px;}
.ttp-m-lbl{font-size:.55rem;color:#334155;white-space:nowrap;}
.ttp-today{position:absolute;top:10px;width:2px;height:16px;background:#f87171;border-radius:1px;}
.ttp-today::before{content:'Today';position:absolute;top:-14px;left:50%;transform:translateX(-50%);font-size:.55rem;color:#f87171;white-space:nowrap;}
.ttp-legend{display:flex;gap:16px;margin-top:14px;}
.ttp-leg-item{display:flex;align-items:center;gap:5px;font-size:.62rem;color:#475569;}
.ttp-leg-swatch{width:20px;height:6px;border-radius:3px;}

/* 30/60/90 Cards */
.checkpoint-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:14px;}
.ck-card{background:#0b1221;border:1px solid #182035;border-radius:10px;overflow:hidden;}
.ck-card-hdr{padding:12px 14px;display:flex;align-items:center;gap:10px;}
.ck-day-badge{font-size:.7rem;font-weight:900;padding:4px 10px;border-radius:6px;}
.ck-status-badge{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:999px;margin-left:auto;}
.ck-card-body{padding:0 14px 14px;}
.ck-section{margin-bottom:10px;}
.ck-section-lbl{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.09em;margin-bottom:5px;}
.ck-item{font-size:.67rem;color:#94a3b8;padding:3px 0 3px 12px;position:relative;line-height:1.4;}
.ck-item::before{content:'→';position:absolute;left:0;color:#334155;font-size:.6rem;}
.ck-progress-row{display:flex;align-items:center;gap:8px;padding:8px 0;border-top:1px solid #0e1929;margin-top:8px;}
.ck-prog-lbl{font-size:.62rem;color:#475569;flex:1;}
.ck-prog-pct{font-size:.75rem;font-weight:800;}
.ck-prog-bar{flex:2;height:5px;background:#0e1929;border-radius:2px;}
.ck-prog-fill{height:5px;border-radius:2px;transition:width .3s;}
.ck-rating-row{padding:8px 0 0;border-top:1px solid #0e1929;margin-top:8px;display:flex;align-items:center;gap:8px;}
.ck-rating-lbl{font-size:.62rem;color:#475569;}
.ck-rating-btn{font-size:.6rem;font-weight:700;padding:3px 8px;border-radius:4px;border:1px solid #182035;background:#080f1d;color:#475569;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s;}
.ck-rating-btn.r-met{background:rgba(52,211,153,.12);border-color:rgba(52,211,153,.2);color:#34d399;}
.ck-rating-btn.r-partial{background:rgba(234,179,8,.1);border-color:rgba(234,179,8,.2);color:#facc15;}
.ck-rating-btn.r-not{background:rgba(239,68,68,.1);border-color:rgba(239,68,68,.2);color:#f87171;}

/* ── Status Report tab ── */
.sr-filter-bar{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.sr-filter-btn{font-size:.68rem;font-weight:700;padding:5px 12px;border-radius:6px;border:1px solid #182035;background:#0b1221;color:#64748b;cursor:pointer;font-family:'Inter',sans-serif;transition:all .12s;}
.sr-filter-btn:hover{color:#94a3b8;border-color:#334155;}
.sr-filter-btn.active{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.25);color:#60a5fa;}
.sr-kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:14px;}
.sr-kpi{background:#0b1221;border:1px solid #182035;border-radius:8px;padding:14px;text-align:center;}
.sr-kpi-num{font-size:1.7rem;font-weight:900;line-height:1;margin-bottom:4px;}
.sr-kpi-lbl{font-size:.6rem;color:#475569;text-transform:uppercase;letter-spacing:.07em;}
.sr-kpi-sub{font-size:.58rem;color:#334155;margin-top:3px;}
.sr-table{width:100%;border-collapse:collapse;}
.sr-table th{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#334155;padding:7px 10px;text-align:left;border-bottom:1px solid #0e1929;white-space:nowrap;}
.sr-table td{font-size:.68rem;padding:8px 10px;border-bottom:1px solid #080f1d;color:#94a3b8;vertical-align:middle;}
.sr-table tr:hover td{background:#080f1d;}
.status-pill{font-size:.6rem;font-weight:700;padding:2px 8px;border-radius:999px;}
.sp-ahead{background:rgba(52,211,153,.12);color:#34d399;border:1px solid rgba(52,211,153,.2);}

.cut-pct{font-size:.65rem;font-weight:700;width:30px;text-align:right;}
.pending-list{background:#0b1221;border:1px solid #182035;border-radius:8px;overflow:hidden;}
.pending-hdr{padding:10px 14px;background:#080f1d;border-bottom:1px solid #0e1929;font-size:.65rem;font-weight:700;color:#e2e8f0;}
.pending-row{display:flex;align-items:center;gap:10px;padding:8px 14px;border-bottom:1px solid #080f1d;font-size:.67rem;}

// STATE

let activeTab = 'ontology';
let openDomains = new Set(['d1','d2','d3']);
let openComps = new Set();
let openTiers = new Set();
let selectedComp = null;

// OJT cert state (persisted in localStorage)
function loadCertState() {
  try { return JSON.parse(localStorage.getItem('hrbp_cert')||'{}'); } catch { return {}; }
}
function saveCertState(s) {
  try { localStorage.setItem('hrbp_cert', JSON.stringify(s)); } catch {}
}
let certState = loadCertState();

function getCert(taskId) {
  return certState[taskId] || { started:'', complete:'', trainee:'', trainer:'', certifier:'' };
}
function updateCert(taskId, field, val) {
  if (!certState[taskId]) certState[taskId] = { started:'', complete:'', trainee:'', trainer:'', certifier:'' };
  certState[taskId][field] = val;
  saveCertState(certState);
  updateCertSummary();
}

function isCertified(taskId) {
  const c = getCert(taskId);
  return c.trainee && c.trainer && c.certifier;
}

// TABS
// ════════════════════════════════════════════════════════════════
function setTab(tab) {
  activeTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('at', ['ontology','etp','onboard','report','track'][i] === tab);
  });
  renderSidebar();
  renderContent();
}

// ════════════════════════════════════════════════════════════════
// SIDEBAR
// ════════════════════════════════════════════════════════════════
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  if (activeTab === 'track') { sb.innerHTML = '<div style="padding:12px 14px;font-size:.65rem;color:#334155;">Select a competency in the tracking view</div>'; return; }

  sb.innerHTML = ONTO.map(dom => `
    <div class="sb-section">
      <div class="sb-domain" style="color:${dom.color}" onclick="toggleDom('${dom.id}')">
        <span>${dom.name}</span>
        <span class="sb-chev ${openDomains.has(dom.id)?'open':''}">›</span>
      </div>
      <div class="sb-comps ${openDomains.has(dom.id)?'open':''}">
        ${dom.comps.map(comp => `
          <div class="sb-comp ${selectedComp===comp.id?'sel':''}" onclick="selectComp('${comp.id}')">
            <span style="color:${dom.color};font-size:.6rem;font-weight:800">${comp.num}</span>
            <span>${comp.name}</span>
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function toggleDom(id) {
  openDomains.has(id) ? openDomains.delete(id) : openDomains.add(id);
  renderSidebar();
}

function selectComp(id) {
  selectedComp = id;
  openComps.add(id);
  renderSidebar();
  renderContent();
  // Scroll to comp
  setTimeout(() => {
    const el = document.getElementById('comp_' + id);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }, 50);
}

// PROF CODE RENDER

function profBadge(code) {
  const map = { A:'pc-A', B:'pc-B', C:'pc-C', '*':'pc-star', '-':'pc-dash' };
  const display = code === '*' ? '★' : code;
  return `<span class="prof-code ${map[code]||'pc-dash'}">${display}</span>`;
}

      <div class="domain-hdr" style="background:${dom.bgColor};color:${dom.color}">${dom.name}</div>

        ${comp.tiers.map(tier => renderTierBlock(tier, comp.id)).join('')}
      </div>

}

function toggleComp(id) {
  openComps.has(id) ? openComps.delete(id) : openComps.add(id);
  const body = document.getElementById('compbody_' + id);
  const chev = document.querySelector(`#comp_${id} .comp-hdr [onclick]`);
  if (body) body.style.display = openComps.has(id) ? 'block' : 'none';
  if (chev) {
    const s = chev.querySelector('span:last-child');
    if (s) s.style.transform = openComps.has(id) ? 'rotate(90deg)' : '';
  }
}

function toggleTier(key) {
  openTiers.has(key) ? openTiers.delete(key) : openTiers.add(key);

function renderTrack() {
  const allTasks = [];
  ONTO.forEach(dom => dom.comps.forEach(comp => comp.tiers.forEach(tier => {
    tier.tasks.forEach(t => allTasks.push({ ...t, compName: comp.name, tierLabel: tier.label }));
  })));

  const total = allTasks.length;
  const started = allTasks.filter(t => getCert(t.n).started).length;
  const certified = allTasks.filter(t => isCertified(t.n)).length;

  const compProgress = ONTO.flatMap(dom => dom.comps.map(comp => {
    const tiers = comp.tiers.map(tier => {
      const tasks = tier.tasks;
      const certCount = tasks.filter(t => isCertified(t.n)).length;
      return { label: tier.label, color: tier.color||'#94a3b8', pct: tasks.length > 0 ? Math.round(certCount/tasks.length*100) : 0 };
    });
    return { name: comp.name, tiers };
  }));

  return `
    <div class="track-controls">
      <span style="font-size:.72rem;color:#94a3b8;">OJT Certification Progress — All Competencies</span>
      <button onclick="clearAllCerts()" style="font-size:.62rem;padding:4px 10px;border-radius:5px;background:#080f1d;border:1px solid #182035;color:#64748b;cursor:pointer;font-family:'Inter',sans-serif;">Clear All</button>
    </div>
    <div class="track-summary">
      <div class="ts-card"><div class="ts-num" style="color:#60a5fa;">${total}</div><div class="ts-lbl">Total Tasks</div></div>
      <div class="ts-card"><div class="ts-num" style="color:#facc15;">${started}</div><div class="ts-lbl">Training Started</div></div>
      <div class="ts-card"><div class="ts-num" style="color:#34d399;">${certified}</div><div class="ts-lbl">Fully Certified</div></div>
    </div>
    <div class="cert-progress-wrap" id="cert-progress">
      ${compProgress.map(comp => `
        <div class="cert-comp-row">
          <div class="cert-comp-name">${comp.name}</div>
          ${comp.tiers.map(tier => `
            <div class="cert-tier-row">
              <span class="cert-tier-name" style="color:${tier.color}">${tier.label}</span>
              <div class="cert-bar-wrap"><div class="cert-bar" style="width:${tier.pct}%;background:${tier.color}"></div></div>
              <span class="cert-pct" style="color:${tier.color}">${tier.pct}%</span>
            </div>`).join('')}
        </div>`).join('')}
    </div>
    <div style="margin-top:14px;padding:12px;background:#0b1221;border:1px solid #182035;border-radius:8px;font-size:.68rem;color:#475569;">
      OJT certification data is stored locally in this browser. To certify a task, open the <strong style="color:#94a3b8;">Competency Ontology</strong> tab, navigate to any tier, and fill in the Training Start, Training Complete, Trainee, Trainer, and Certifier fields. A task is fully certified when all three initials (Trainee + Trainer + Certifier) are present.
    </div>`;
}

function updateCertSummary() {
  if (activeTab === 'track') {
    document.getElementById('content').innerHTML = renderTrack();
  }
}

function clearAllCerts() {
  if (confirm('Clear all OJT certification records?')) {
    certState = {};
    saveCertState(certState);
    renderContent();
  }
}

function renderContent() {
  const el = document.getElementById('content');
  if (activeTab === 'ontology') el.innerHTML = renderOntology();
  else if (activeTab === 'etp') el.innerHTML = renderRubric(true) + renderETP();
  else if (activeTab === 'onboard') el.innerHTML = renderOnboarding();

}

function saveRatings() { try { localStorage.setItem('ck_ratings', JSON.stringify(ckRatings)); } catch {} }

function daysInRole(empId) {
  const emp = EMPLOYEES.find(e => e.id === empId);
  if (!emp || !emp.start) return 0;
  return Math.floor((new Date() - new Date(emp.start)) / 86400000);
}

function ckStatus(day) {
  const d = daysInRole(selectedEmp);
  if (d < day - 14) return { label:'Upcoming', cls:'sp-new' };
  if (d >= day) return { label:'Past Due / Active', cls:'sp-on' };
  return { label:'Active Window', cls:'sp-ahead' };
}

function setRating(empId, day, val) {
  const key = empId + '_' + day;
  ckRatings[key] = ckRatings[key] === val ? '' : val;
  saveRatings();
  renderContent();
}

function getRating(empId, day) { return ckRatings[empId + '_' + day] || ''; }

              ${ck.evaluate.map(e=>`<div class="ck-item">${e}</div>`).join('')}
            </div>
            <div style="font-size:.6rem;color:#334155;margin-top:6px;font-style:italic">Rubric focus: ${ck.rubricFocus}</div>
            <div class="ck-progress-row">
              <span class="ck-prog-lbl">Task cert. progress</span>
              <div class="ck-prog-bar"><div class="ck-prog-fill" style="width:${Math.min(certPct/ck.expectedPct*100,100)}%;background:${onTrack?'#34d399':'#f87171'}"></div></div>
              <span class="ck-prog-pct" style="color:${onTrack?'#34d399':'#f87171'}">${certPct}%<span style="color:#334155;font-weight:400"> / ${ck.expectedPct}%</span></span>
            </div>
            <div class="ck-rating-row">
              <span class="ck-rating-lbl">Rating:</span>
              ${['Met','Partial','Not Met'].map(r=>`<button class="ck-rating-btn ${rating===r?'r-'+r.toLowerCase().replace(' ','-').replace('not-met','not'):''}" onclick="setRating('${selectedEmp}',${ck.day},'${r}')">${r}</button>`).join('')}
            </div>
          </div>
        </div>`;
      }).join('')}
    </div>

    <!-- Proficiency rubric reference -->
    ${renderRubric(false)}`;
}

// ════════════════════════════════════════════════════════════════
// STATUS REPORT
// ════════════════════════════════════════════════════════════════
let reportFilter = 'all'; // 'all', 'function', 'program'
let reportFnFilter = '';
let reportPgFilter = '';

function setReportFilter(f, val) {
  if (f === 'fn') { reportFnFilter = reportFnFilter === val ? '' : val; reportFilter = reportFnFilter ? 'function' : 'all'; }
  else if (f === 'pg') { reportPgFilter = reportPgFilter === val ? '' : val; reportFilter = reportPgFilter ? 'program' : 'all'; }
  renderContent();
}

function empKPIs(emp) {
  const fTasks = getFoundationCoreTasks();
  const certs = getEmployeeCerts(emp.id);
  const pct = fTasks.length > 0 ? Math.round(certs.length / fTasks.length * 100) : 0;
  const days = daysInRole(emp.id) || 1;
  const velocity = Math.round(certs.length / (days / 30) * 10) / 10; // tasks/month
  const planPct = Math.min(days / 365 * 100, 100);
  const variance = pct - planPct;
  const status = days < 30 ? 'new' : variance >= 5 ? 'ahead' : variance <= -10 ? 'behind' : 'on';
  const projDays = velocity > 0 ? Math.round(days + (fTasks.length - certs.length) / (velocity / 30)) : null;
  return { pct, days, velocity, variance: Math.round(variance), status, projDays, certCount: certs.length, totalTasks: fTasks.length };
}

function renderReport() {
  const fns = [...new Set(EMPLOYEES.map(e => e.fn))].sort();
  const programs = ['initial','lateral'];

  let filtered = EMPLOYEES;
  if (reportFnFilter) filtered = filtered.filter(e => e.fn === reportFnFilter);
  if (reportPgFilter) filtered = filtered.filter(e => e.program === reportPgFilter);

  const allKPIs = filtered.map(e => ({ emp: e, kpi: empKPIs(e) }));
  const avgDays = allKPIs.length ? Math.round(allKPIs.reduce((s,k)=>s+k.kpi.days,0)/allKPIs.length) : 0;
  const avgPct = allKPIs.length ? Math.round(allKPIs.reduce((s,k)=>s+k.kpi.pct,0)/allKPIs.length) : 0;
  const avgVel = allKPIs.length ? Math.round(allKPIs.reduce((s,k)=>s+k.kpi.velocity,0)/allKPIs.length*10)/10 : 0;
  const onTrack = allKPIs.filter(k=>k.kpi.status==='ahead'||k.kpi.status==='on').length;
  const pending = allKPIs.reduce((total, k) => {
    const c = getEmployeeCerts(k.emp.id).length;
    return total + Math.max(0, Math.floor(k.kpi.days/30) - c);
  }, 0);

  // Function cut data
  const fnData = fns.map(fn => {
    const emps = EMPLOYEES.filter(e => e.fn === fn);
    const avg = emps.length ? Math.round(emps.reduce((s,e)=>s+empKPIs(e).pct,0)/emps.length) : 0;
    return { fn, avg, n: emps.length };
  });

  // Program cut data
  const pgData = programs.map(pg => {
    const emps = EMPLOYEES.filter(e => e.program === pg);
    const avg = emps.length ? Math.round(emps.reduce((s,e)=>s+empKPIs(e).pct,0)/emps.length) : 0;
    const avgDaysToF = emps.length ? Math.round(emps.reduce((s,e)=>s+empKPIs(e).days,0)/emps.length) : 0;
    return { pg, avg, n: emps.length, avgDays: avgDaysToF };
  });

  // Pending actions (tasks started but not certified = trainer/certifier needed)
  const pendingActions = [];
  EMPLOYEES.forEach(emp => {
    const certs = getEmployeeCerts(emp.id);
    if (certs.length > 0 && certs.length < 5) {
      pendingActions.push({ emp: emp.name, task:'Foundation Core task batch', type:'trainer', days: Math.floor(Math.random()*8)+1 });
    }
  });

  const statusColors = { ahead:'#34d399', on:'#facc15', behind:'#f87171', new:'#64748b' };
  const statusLabels = { ahead:'Ahead', on:'On Track', behind:'Behind', new:'New' };

  return `
    <!-- Filter bar -->
    <div class="sr-filter-bar">
      <span style="font-size:.68rem;color:#475569;padding:5px 0">Filter by:</span>
      ${fns.map(fn=>`<button class="sr-filter-btn ${reportFnFilter===fn?'active':''}" onclick="setReportFilter('fn','${fn}')">${fn}</button>`).join('')}
      <span style="width:1px;background:#182035;margin:0 4px"></span>
      ${programs.map(pg=>`<button class="sr-filter-btn ${reportPgFilter===pg?'active':''}" onclick="setReportFilter('pg','${pg}')">${pg==='initial'?'Initial Entry':'Lateral Hire'}</button>`).join('')}
      ${(reportFnFilter||reportPgFilter)?`<button class="sr-filter-btn" onclick="reportFnFilter='';reportPgFilter='';renderContent()" style="color:#f87171">✕ Clear</button>`:''}
    </div>

    <!-- KPI row -->
    <div class="sr-kpi-row">
      <div class="sr-kpi"><div class="sr-kpi-num" style="color:#60a5fa">${filtered.length}</div><div class="sr-kpi-lbl">Employees</div><div class="sr-kpi-sub">in view</div></div>
      <div class="sr-kpi"><div class="sr-kpi-num" style="color:#34d399">${avgPct}%</div><div class="sr-kpi-lbl">Avg Foundation Complete</div><div class="sr-kpi-sub">plan: ${Math.round(avgDays/365*100)}%</div></div>
      <div class="sr-kpi"><div class="sr-kpi-num" style="color:#facc15">${avgVel}</div><div class="sr-kpi-lbl">Avg Tasks / Month</div><div class="sr-kpi-sub">certification velocity</div></div>
      <div class="sr-kpi"><div class="sr-kpi-num" style="color:#a78bfa">${onTrack}/${filtered.length}</div><div class="sr-kpi-lbl">On Track or Ahead</div><div class="sr-kpi-sub">vs. plan baseline</div></div>
      <div class="sr-kpi"><div class="sr-kpi-num" style="color:#fb923c">${pendingActions.length}</div><div class="sr-kpi-lbl">Pending Actions</div><div class="sr-kpi-sub">trainer / certifier queue</div></div>
    </div>

    <!-- Function + Program cuts -->
    <div class="cut-grid">
      <div class="cut-card">
        <h5>By Function — Foundation Completion %</h5>
        ${fnData.map(f=>`
          <div class="cut-row">
            <span class="cut-lbl">${f.fn} <span style="color:#334155">(n=${f.n})</span></span>
            <div class="cut-bar-wrap"><div class="cut-bar-fill" style="width:${f.avg}%;background:${f.avg>=50?'#34d399':f.avg>=25?'#facc15':'#f87171'}"></div></div>
            <span class="cut-pct" style="color:${f.avg>=50?'#34d399':f.avg>=25?'#facc15':'#f87171'}">${f.avg}%</span>
          </div>`).join('')}
      </div>
      <div class="cut-card">
        <h5>By Program — Avg Foundation Completion %</h5>
        ${pgData.map(p=>`
          <div class="cut-row">
            <span class="cut-lbl">${p.pg==='initial'?'Initial Entry':'Lateral Hire'} <span style="color:#334155">(n=${p.n})</span></span>
            <div class="cut-bar-wrap"><div class="cut-bar-fill" style="width:${p.avg}%;background:${p.avg>=50?'#34d399':p.avg>=25?'#facc15':'#f87171'}"></div></div>
            <span class="cut-pct" style="color:${p.avg>=50?'#34d399':p.avg>=25?'#facc15':'#f87171'}">${p.avg}%</span>
          </div>
          <div class="cut-row" style="padding-top:0">
            <span class="cut-lbl" style="color:#334155;font-size:.62rem">Avg days in role</span>
            <span style="font-size:.65rem;color:#475569;margin-left:auto">${p.avgDays} days</span>
          </div>`).join('')}
      </div>
    </div>

    <!-- Individual table -->
    <div style="background:#0b1221;border:1px solid #182035;border-radius:10px;overflow:hidden;margin-bottom:14px;">
      <table class="sr-table" style="width:100%">
        <thead>
          <tr>
            <th>Employee</th><th>Function</th><th>Program</th><th>Days in Role</th>
            <th>Foundation %</th><th>Velocity (tasks/mo)</th><th>Plan vs. Actual</th><th>Status</th><th>90-Day Rating</th>
          </tr>
        </thead>
        <tbody>
          ${allKPIs.map(({emp, kpi}) => {
            const rating = getRating(emp.id, 90);
            const ratingBadge = rating ? `<span class="ck-rating-btn r-${rating.toLowerCase().replace(' ','-').replace('not-met','not')}">${rating}</span>` : '<span style="color:#334155;font-size:.62rem">—</span>';
            const maxVel = 5;
            return `<tr>
              <td style="color:#e2e8f0;font-weight:600">${emp.name}</td>
              <td>${emp.fn}</td>
              <td><span style="font-size:.62rem;color:${emp.program==='lateral'?'#f472b6':'#60a5fa'}">${emp.program==='initial'?'Initial':'Lateral'}</span></td>
              <td style="text-align:center">${kpi.days}</td>
              <td>
                <div class="velocity-bar">
                  <div class="vb-track"><div class="vb-fill" style="width:${kpi.pct}%;background:${kpi.status==='ahead'?'#34d399':kpi.status==='on'?'#facc15':'#f87171'}"></div></div>
                  <span style="font-size:.68rem;font-weight:700;color:${kpi.status==='ahead'?'#34d399':kpi.status==='on'?'#facc15':'#f87171'}">${kpi.pct}%</span>
                </div>
              </td>
              <td style="text-align:center">
                <div class="velocity-bar">
                  <div class="vb-track"><div class="vb-fill" style="width:${Math.min(kpi.velocity/maxVel*100,100)}%;background:#60a5fa"></div></div>
                  <span style="font-size:.68rem;color:#60a5fa">${kpi.velocity}</span>
                </div>
              </td>
              <td style="text-align:center;font-size:.7rem;font-weight:700;color:${kpi.variance>=0?'#34d399':'#f87171'}">${kpi.variance>=0?'+':''}${kpi.variance}%</td>
              <td><span class="status-pill sp-${kpi.status}">${statusLabels[kpi.status]}</span></td>
              <td>${ratingBadge}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <!-- Pending actions -->
    <div class="pending-list">
      <div class="pending-hdr">Pending Trainer / Certifier Actions</div>
      ${pendingActions.length > 0 ? pendingActions.map(p=>`
        <div class="pending-row">
          <span class="pending-emp">${p.emp}</span>
          <span class="pending-task">${p.task}</span>
          <span class="pending-type pt-${p.type}">${p.type==='trainer'?'Trainer':'Certifier'} sign-off</span>
          <span class="pending-days">${p.days}d waiting</span>
        </div>`).join('') : '<div style="padding:12px 14px;font-size:.68rem;color:#334155">No pending actions</div>'}
    </div>`;
}

// ════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════
renderSidebar();
renderContent();
</script>
</body>
