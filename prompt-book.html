<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Workforce Intelligence Prompt Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0d14;
      --surface: #111520;
      --surface2: #161b2a;
      --border: #1e2740;
      --text: #d4e0ff;
      --muted: #5a6a9a;
      --heading: #ffffff;
      --cyan: #00d4ff;
      --purple: #8b5cf6;
      --emerald: #10b981;
      --amber: #f59e0b;
      --blue: #3b82f6;
      --sidebar-w: 268px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      line-height: 1.6;
      display: flex;
      min-height: 100vh;
    }

    /* ── SIDEBAR ── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--surface);
      border-right: 1px solid var(--border);
      height: 100vh;
      position: fixed;
      top: 0; left: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 100;
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }

    .logo-eyebrow {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--cyan);
      margin-bottom: 6px;
    }

    .logo-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--heading);
      line-height: 1.3;
    }

    .logo-meta {
      font-size: 11px;
      color: var(--muted);
      margin-top: 5px;
      font-family: 'JetBrains Mono', monospace;
    }

    .sidebar-nav { padding: 12px 0 32px; }

    .nav-group-label {
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 14px 20px 5px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 6px 20px;
      cursor: pointer;
      transition: background 0.12s;
      color: var(--text);
      font-size: 12.5px;
      font-weight: 600;
      text-decoration: none;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-item:hover { background: var(--surface2); }

    .nav-item.active {
      background: rgba(0,212,255,0.07);
      color: var(--cyan);
    }

    .nav-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .nav-badge {
      margin-left: auto;
      font-size: 9.5px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
    }

    /* ── MAIN ── */
    #app {
      margin-left: var(--sidebar-w);
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #header {
      position: sticky;
      top: 0;
      background: rgba(10,13,20,0.92);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
      padding: 13px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 50;
    }

    .search-wrap {
      flex: 1;
      max-width: 500px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 16px;
      pointer-events: none;
      line-height: 1;
    }

    #search {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px 12px 9px 36px;
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
    }

    #search:focus { border-color: var(--cyan); }
    #search::placeholder { color: var(--muted); }

    #search-count {
      font-size: 11.5px;
      color: var(--muted);
      white-space: nowrap;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── CONTENT ── */
    #content {
      padding: 40px 44px 100px;
      max-width: 920px;
    }

    .section-block {
      padding-top: 52px;
      margin-top: 4px;
      border-top: 1px solid var(--border);
    }

    .section-block:first-child {
      padding-top: 0;
      border-top: none;
    }

    .section-eyebrow {
      display: inline-block;
      font-size: 9px;
      font-weight: 800;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 3px 9px;
      border-radius: 4px;
      margin-bottom: 10px;
    }

    .section-title {
      font-size: 28px;
      font-weight: 800;
      color: var(--heading);
      line-height: 1.2;
      margin-bottom: 6px;
    }

    .section-tagline {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .file-block {
      margin-bottom: 44px;
      scroll-margin-top: 80px;
    }

    .file-header {
      display: flex;
      align-items: baseline;
      gap: 10px;
      margin-bottom: 4px;
    }

    .file-title {
      font-size: 17px;
      font-weight: 800;
      color: var(--heading);
    }

    .file-count {
      font-size: 11px;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
    }

    .file-desc {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 14px;
      line-height: 1.55;
    }

    .prompts-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .prompt-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 48px 13px 48px;
      position: relative;
      transition: border-color 0.13s, background 0.13s;
    }

    .prompt-card:hover {
      border-color: rgba(0,212,255,0.25);
      background: var(--surface2);
    }

    .prompt-card:hover .copy-btn { opacity: 1; }

    .prompt-num {
      position: absolute;
      left: 16px; top: 14px;
      font-size: 10px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      width: 22px;
      text-align: right;
    }

    .prompt-text {
      font-size: 13.5px;
      line-height: 1.7;
      color: var(--text);
    }

    .copy-btn {
      position: absolute;
      right: 11px; top: 11px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 3px 8px;
      color: var(--muted);
      font-size: 9.5px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.13s, color 0.13s, border-color 0.13s;
      letter-spacing: 0.04em;
    }

    .copy-btn:hover {
      color: var(--cyan);
      border-color: var(--cyan);
    }

    mark {
      background: rgba(0,212,255,0.18);
      color: var(--cyan);
      border-radius: 2px;
      padding: 0 1px;
    }

    .hidden { display: none !important; }

    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
    }

    .empty-state p { margin-top: 8px; font-size: 13px; }

    #toast {
      position: fixed;
      bottom: 24px; right: 24px;
      background: var(--cyan);
      color: #0a0d14;
      padding: 10px 18px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 800;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.18s, transform 0.18s;
      pointer-events: none;
      z-index: 300;
    }

    #toast.show { opacity: 1; transform: translateY(0); }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--muted); }

    @media (max-width: 768px) {
      #sidebar { display: none; }
      #app { margin-left: 0; }
      #content { padding: 24px 20px 80px; }
      #header { padding: 12px 20px; }
    }
  </style>
</head>
<body>

<aside id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-eyebrow">WFI Prompt Book</div>
    <div class="logo-title">Workforce Intelligence<br>Prompt Book</div>
    <div class="logo-meta" id="total-display">— prompts</div>
  </div>
  <nav class="sidebar-nav" id="sidebar-nav"></nav>
</aside>

<div id="app">
  <header id="header">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="search" id="search" placeholder="Search all prompts…" autocomplete="off" spellcheck="false" />
    </div>
    <span id="search-count"></span>
  </header>
  <main id="content"></main>
</div>

<div id="toast">Copied to clipboard</div>

<script>
/* ═══════════════════════════════════════════════════════════════════════
   PROMPT DATA — EDIT HERE
   ─────────────────────────────────────────────────────────────────────
   To ADD a prompt:    copy any line inside a "prompts" array and paste
   To EDIT a prompt:   change the text between the double quotes
   To REMOVE a prompt: delete the entire line (including the comma)
   To ADD a new file:  copy an entire {...} file block and paste it
   ═══════════════════════════════════════════════════════════════════════ */

const SECTIONS = [

  /* ── 1. DIAGNOSTIC SKILLS ─────────────────────────────────────────── */
  {
    id: "diagnostic",
    title: "Diagnostic Skills",
    color: "#00d4ff",
    colorBg: "rgba(0,212,255,0.08)",
    tagline: "Map the work before you automate it",
    files: [
      {
        id: "workforce-data-audit",
        title: "Workforce Data Audit",
        desc: "Assess the quality and coverage of your people data before building any models",
        prompts: [
          "Map every data field currently collected in our HRIS and flag any field with more than 10% missing values. For each gap, identify which workforce planning models or decisions depend on that field.",
          "Review our job architecture data for consistency: flag duplicate job codes, titles with no mapped competencies, and roles where the salary grade has not been updated in more than three years.",
          "Assess our attrition tracking methodology. Do we distinguish voluntary vs. involuntary exits? Regrettable vs. non-regrettable? If not, draft a taxonomy we could adopt and the system changes needed to support it.",
          "Audit the freshness of our headcount data: how often is it updated, who owns it, and where do the numbers diverge between HR, Finance, and business unit reports?",
          "Identify the top five data quality issues that currently limit our ability to run a reliable workforce demand forecast. For each, estimate the effort to fix it and the risk of proceeding without fixing it.",
          "Map our current workforce data assets against a standard people analytics maturity model. Where are we at Level 1 (descriptive), Level 2 (diagnostic), or Level 3 (predictive)?",
          "List every external labor market data source we currently subscribe to or use ad hoc. Evaluate each for coverage, update frequency, and cost-to-value ratio.",
          "Review our performance data for rating distribution: are we experiencing compression? How does this affect our ability to use performance as a variable in talent decisions?",
          "Identify all the places where the same workforce metric is defined differently across HR, Finance, and the business. Draft a data dictionary entry for headcount that all three functions could agree on.",
          "Audit our diversity data: which demographic fields are collected, what are the opt-out rates, and which analyses are currently blocked by data gaps?",
          "Assess whether our current HR data infrastructure can support a skills ontology. What are the key technical and governance requirements we would need to meet?",
          "Map the lineage of our standard headcount report from raw data source through transformation to final metric. Identify every step where human intervention creates error risk.",
          "Identify our riskiest single point of data dependency — the one dataset that, if lost or corrupted, would most severely limit our workforce planning capability.",
          "Evaluate the gap between the workforce data we collect and the data needed to answer the CHRO's top three board-level people questions. Prioritize the gaps by strategic impact.",
          "Review our internal mobility data: do we track lateral moves, project assignments, and stretch roles? What is missing that would give us a better picture of talent flow?",
          "Compare our actual data governance practices to what is documented in our HR data policy. List the top five deviations and the risk each creates.",
          "Estimate the cost of our current workforce data quality problems in analyst hours, bad decisions, and delayed projects. Use this to build a business case for a data quality initiative.",
          "Identify which of our workforce KPIs are lagging indicators vs. leading indicators. What leading indicators are we currently not tracking that would improve our ability to anticipate workforce problems?"
        ]
      },
      {
        id: "ai-readiness",
        title: "AI Readiness",
        desc: "Evaluate the organization's readiness to adopt AI across workforce intelligence functions",
        prompts: [
          "Assess our organization's AI readiness across five dimensions: data infrastructure, talent capability, governance, leadership alignment, and change appetite. Rate each 1–5 and identify the two lowest-scoring dimensions as priority gaps.",
          "Write 10 interview questions to run with HR leaders to assess how comfortable they are with AI-assisted decision-making in talent processes.",
          "Identify the top three workforce processes in our HR function where AI could add immediate value with the lowest implementation risk. Explain the selection criteria.",
          "Map our current HR technology stack and identify which tools already have embedded AI features we are not using. Estimate the value being left on the table.",
          "Draft a one-page AI literacy assessment for HR business partners that tests their ability to interpret model outputs, recognize bias, and apply ethical guardrails.",
          "Identify the three biggest AI-related risks in our workforce intelligence function — data privacy, algorithmic bias, and explainability gaps. For each, assess current exposure and the mitigation we should put in place.",
          "Evaluate our current data governance framework against the requirements for responsible AI use in people decisions. List the gaps and prioritize them by risk level.",
          "Assess leadership readiness: what signals from the C-suite indicate support for AI in HR? What signals indicate resistance? How do we close the gap?",
          "Identify the legal and regulatory constraints on AI use in employment decisions in our operating jurisdictions. Summarize the no-go zones and the gray areas.",
          "Draft a vendor assessment rubric for AI-powered HR tools covering: explainability, bias testing, data security, compliance certifications, and model refresh cadence.",
          "Map the current decision rights for people analytics outputs: who can see model results, who can act on them, and who is accountable for outcomes? Identify the gaps and ambiguities.",
          "Evaluate the skills gap in our people analytics team against the requirements for building and deploying AI models. What roles do we need that we do not currently have?",
          "Create a readiness scorecard for piloting AI-assisted workforce planning: data readiness (0–25), process readiness (0–25), talent readiness (0–25), governance readiness (0–25).",
          "Identify our most data-rich HR process — the one with the most complete, clean, longitudinal data — and assess whether it is the right place to start an AI pilot.",
          "Draft the questions our CHRO will get asked by the board about AI in HR, and write model answers for each.",
          "Map AI adoption barriers by stakeholder group: HR leaders, HRBPs, business unit leaders, employees. What is the primary concern for each group?",
          "Evaluate three AI deployment models — build in-house, configure vendor platform, partner with a consulting firm — against our specific organizational constraints and risk appetite.",
          "Write a 90-day AI readiness sprint plan covering the assessments, pilots, governance decisions, and stakeholder engagements that need to happen before we commit to a full AI roadmap."
        ]
      },
      {
        id: "use-case-prioritization",
        title: "Use Case Prioritization",
        desc: "Identify and sequence AI use cases with the highest value-to-risk ratio",
        prompts: [
          "List the top 10 use cases for AI in our workforce planning function. Score each on strategic value (1–5), data readiness (1–5), implementation complexity (1–5 inverse), and stakeholder appetite (1–5).",
          "Apply a 2x2 prioritization matrix — impact vs. feasibility — to our potential AI use cases. Identify the quick wins quadrant and the big bets quadrant.",
          "Write a one-paragraph business case for each of our top three AI use cases, covering the problem being solved, the expected outcome, the investment required, and the risk profile.",
          "Identify AI use cases that could be funded through cost savings vs. those that require net-new investment. Which set is easier to move through budget approval?",
          "Map each proposed AI use case to a specific CHRO or CEO priority. Eliminate or defer any use case that cannot be tied to a strategic objective.",
          "Assess the organizational cost of not automating our top three manual workforce processes. Use this as the do-nothing baseline in our prioritization model.",
          "For our highest-priority AI use case, write the user story: as a [role], I want [AI capability] so that I can [outcome]. Include the acceptance criteria.",
          "Identify which AI use cases require changes to decision rights or governance before they can be deployed. Separate can-start-now cases from needs-governance-change cases.",
          "Map our AI use case roadmap over 18 months: what do we pilot in months 1–3, scale in months 4–9, and institutionalize in months 10–18?",
          "Evaluate whether our current AI use case list is too operationally focused. Are we missing any strategic uses of AI in workforce planning that could differentiate us?",
          "Identify the AI use case that would have the highest impact on manager experience. This is often an underweighted constituency in HR technology prioritization.",
          "Assess each AI use case for employee trust risk: which ones could damage trust if misunderstood or misapplied? How do we sequence communications around them?",
          "Write the scoring rubric we will use to evaluate proposals for AI investment from HR business partners. What are the five criteria and their relative weights?",
          "Identify any AI use cases that overlap with initiatives already underway in IT, Finance, or the business. Where can we piggyback rather than build separately?",
          "Stress-test our top AI use case: what are the three most likely failure modes? For each, assess probability and impact, and write a mitigation plan.",
          "Estimate the total addressable value of AI across our workforce planning function over three years using conservative, base, and optimistic scenarios.",
          "Draft the criteria for deciding when to pause or kill an AI pilot that is not delivering expected results.",
          "Write a one-page executive summary of our AI use case roadmap for the CHRO: what we are doing, why, in what order, and what we need to succeed."
        ]
      },
      {
        id: "build-vs-buy",
        title: "Build vs. Buy",
        desc: "Evaluate make, buy, and partner decisions for workforce intelligence tools and capabilities",
        prompts: [
          "For our top AI use case, evaluate three options: build in-house, configure an existing vendor platform, and purchase a point solution. Compare on total cost of ownership, time to value, and flexibility.",
          "Write the vendor RFP criteria for a workforce planning platform: what are the must-haves, nice-to-haves, and disqualifiers?",
          "Assess our internal capability to build and maintain a workforce forecasting model. What skills, infrastructure, and time are required? What is the realistic total cost?",
          "Identify which of our workforce intelligence capabilities should be treated as core differentiators to build vs. commodity functions to buy.",
          "Evaluate our current HR tech vendors for AI capabilities they are rolling out that we have not yet activated. What is the low-effort, high-value activation list?",
          "Write a risk register for a build-in-house workforce analytics platform covering technology risk, talent risk, timeline risk, and adoption risk.",
          "Draft the contract terms we should insist on with any AI vendor handling employee data: data residency, model explainability, audit rights, and termination and data-return provisions.",
          "Map the hidden costs of a buy decision: implementation, customization, integration, training, and ongoing licensing. Compare to the visible price tag.",
          "Identify which workforce intelligence capabilities we currently rely on consultants or vendors for that we should bring in-house. What is the build plan?",
          "Assess the opportunity cost of build: if our people analytics team builds a custom tool, what vendor relationships and strategic projects get deprioritized?",
          "Write the criteria for evaluating a partnership model — with a labor market data provider or an AI research firm — vs. build or buy.",
          "Identify the single workforce intelligence capability that is most critical to own ourselves. What would we lose by outsourcing it?",
          "Draft a three-year technology roadmap for our workforce intelligence function assuming a buy-and-integrate strategy. What platforms, in what sequence?",
          "Evaluate the market for workforce planning platforms: who are the top five vendors, what are their differentiating capabilities, and what are their known weaknesses?",
          "Write the business case for consolidating three separate HR analytics tools onto one platform. Quantify the integration overhead we are currently paying.",
          "Assess our vendor dependency risk: which of our current workforce intelligence capabilities would be severely disrupted if our primary vendor were acquired or shut down?"
        ]
      }
    ]
  },

  /* ── 2. WORKFORCE PLANNING ────────────────────────────────────────── */
  {
    id: "planning",
    title: "Workforce Planning",
    color: "#8b5cf6",
    colorBg: "rgba(139,92,246,0.08)",
    tagline: "Translate strategy into supply, demand, and gap",
    files: [
      {
        id: "demand-forecasting",
        title: "Demand Forecasting",
        desc: "Translate business strategy and operational drivers into headcount and capability requirements",
        prompts: [
          "Build a structured intake template for collecting workforce demand drivers from business unit leaders. Include revenue targets, productivity assumptions, new capability needs, and planned exits.",
          "Convert our three-year strategic plan into a headcount demand model. For each business initiative, identify the role families impacted, the net headcount change, and the timeline.",
          "Write the questions I should ask the CFO to understand which financial assumptions drive their headcount model. How do I reconcile HR's view with Finance's?",
          "Identify the top five external drivers that should inform our workforce demand forecast: economic, competitive, regulatory, technological, and demographic.",
          "Draft a demand forecast methodology one-pager for business unit leaders: what inputs we need from them, how we will use the data, and what they will get back.",
          "Build a productivity assumption template: for each major role family, document the current output-per-FTE baseline and the expected change over the planning horizon.",
          "Identify the workforce demand signals most likely to be wrong in our current forecast. What assumptions are we most uncertain about, and how do we bound the uncertainty?",
          "Write the logic for converting a revenue growth assumption into a headcount number for a specific function such as sales, engineering, or operations. What is the ratio, and what breaks it?",
          "Map the demand forecast to cost: for each role family in the plan, calculate the fully-loaded cost per FTE and the total forecasted labor cost in each scenario.",
          "Identify which business units are most likely to understate their demand because they are optimistic about efficiency, and which are likely to overstate it because they are padding.",
          "Write a set of calibration questions to stress-test headcount requests from business unit leaders before including them in the enterprise forecast.",
          "Build a demand sensitivity analysis: how does our headcount forecast change if revenue grows 10% faster or slower than plan? Which roles are most elastic?",
          "Identify the workforce demand implications of our top three technology investments — automation, ERP upgrade, AI deployment. How do these change role mix and headcount?",
          "Draft a demand forecast review cadence: when do we update the forecast, who attends, and what triggers an off-cycle revision?",
          "Write the CHRO's demand forecast narrative for the board: what are we planning to hire, why, and what are the key risks to achieving those plans?",
          "Identify roles where demand is growing faster than our ability to source or develop talent internally. These are our critical supply-risk roles.",
          "Build a workforce demand waterfall: starting from current headcount, model growth hires, backfill hires, and attrition to arrive at total hiring volume by quarter.",
          "Write the definition of headcount we will use in our demand forecast — does it include contractors, part-time, offshore — and get every stakeholder aligned before modeling."
        ]
      },
      {
        id: "supply-modeling",
        title: "Supply Modeling",
        desc: "Model internal talent supply through attrition, mobility, and pipeline analysis",
        prompts: [
          "Build a talent supply model for our top ten critical role families. For each, project the internal supply at the end of each planning year using historical attrition rates and promotion rates.",
          "Identify the attrition drivers in our highest-priority role families. Use exit survey data, tenure distributions, and compensation benchmarks to diagnose root causes.",
          "Write a methodology for segmenting attrition into planned vs. unplanned and regrettable vs. non-regrettable. How do we use each segment differently in our supply model?",
          "Model our internal mobility rate: what percentage of open roles are filled internally vs. externally? How does this compare to industry benchmarks and our strategic intent?",
          "Build a pipeline health assessment for our top five critical roles: how many qualified internal candidates are in a 0–12 month, 12–24 month, and 24–36 month readiness window?",
          "Identify the supply bottlenecks in our talent pipeline: which roles have the thinnest bench, and what is the consequence if those positions turn over?",
          "Write the logic for a retirement risk model: using age, tenure, and benefits vesting data, estimate which employees are likely to retire in each planning year.",
          "Build a promotion velocity model: how long does it take for talent to move from one level to the next in our organization? How does this compare to employee expectations?",
          "Identify the supply implications of our current L&D investments. Which programs are producing ready-now talent for critical roles, and which have low ROI?",
          "Model the impact of a 20% increase in voluntary attrition in our technology roles. What is the cascading effect on project delivery and workforce cost?",
          "Write a talent supply risk report for the CHRO: the top five role families where supply is most at risk of falling short of demand in the next 24 months.",
          "Build a sourcing channel analysis: for each role family, what percentage of successful hires came from internal mobility, employee referrals, direct sourcing, and agencies? What does this tell us about where to invest?",
          "Identify the supply of diverse talent in our pipeline for leadership roles. Where are the greatest gaps, and at what career stage are we losing diverse talent?",
          "Model the supply impact of a hybrid or remote policy change. How does offering full remote affect our ability to access talent in new geographies?",
          "Write the assumptions our supply model makes about productivity ramp-up for new hires and transfers. How does ramp time affect our effective supply?",
          "Identify which of our talent pools are shared with competitors and therefore most at risk of rapid supply deterioration in a hot labor market.",
          "Build a contractor-to-employee conversion model: for our most-used contractor roles, what are the cost, speed, and quality tradeoffs of converting to FTE?",
          "Write a supply model refresh protocol: what data inputs are updated monthly, quarterly, and annually, and who is responsible for each?"
        ]

// Flatten all prompts for search
let allPrompts = [];
SECTIONS.forEach(s => s.files.forEach(f => f.prompts.forEach((p, i) => {
  allPrompts.push({ text: p, sectionId: s.id, fileId: f.id, idx: i });
})));

const totalCount = allPrompts.length;
document.getElementById("total-display").textContent = totalCount + " prompts";

// Build sidebar
const nav = document.getElementById("sidebar-nav");
SECTIONS.forEach(s => {
  const label = document.createElement("div");
  label.className = "nav-group-label";
  label.textContent = s.title;
  nav.appendChild(label);

  s.files.forEach(f => {
    const btn = document.createElement("button");
    btn.className = "nav-item";
    btn.dataset.fileId = f.id;
    btn.innerHTML = `
      <span class="nav-dot" style="background:${s.color}"></span>
      ${f.title}
      <span class="nav-badge">${f.prompts.length}</span>
    `;
    btn.addEventListener("click", () => {
      const el = document.getElementById("file-" + f.id);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    });
    nav.appendChild(btn);
  });
});

// Build content
const content = document.getElementById("content");
SECTIONS.forEach((s, si) => {
  const sBlock = document.createElement("section");
  sBlock.className = "section-block";
  sBlock.id = "section-" + s.id;
  sBlock.innerHTML = `
    <div class="section-eyebrow" style="background:${s.colorBg};color:${s.color};">${s.title}</div>
    <h2 class="section-title">${s.title}</h2>
    <p class="section-tagline">${s.tagline}</p>
  `;
  s.files.forEach(f => {
    const fBlock = document.createElement("div");
    fBlock.className = "file-block";
    fBlock.id = "file-" + f.id;
    fBlock.innerHTML = `
      <div class="file-header">
        <span class="file-title">${f.title}</span>
        <span class="file-count">${f.prompts.length} prompts</span>
      </div>
      <p class="file-desc">${f.desc}</p>
      <div class="prompts-list" id="list-${f.id}"></div>
    `;
    const list = fBlock.querySelector("#list-" + f.id);
    f.prompts.forEach((p, i) => {
      const card = document.createElement("div");
      card.className = "prompt-card";
      card.dataset.prompt = p.toLowerCase();
      card.innerHTML = `
        <span class="prompt-num">${i + 1}</span>
        <div class="prompt-text">${escHtml(p)}</div>
        <button class="copy-btn" title="Copy prompt">COPY</button>
      `;
      card.querySelector(".copy-btn").addEventListener("click", e => {
        e.stopPropagation();
        navigator.clipboard.writeText(p).then(() => showToast());
      });
      list.appendChild(card);
    });
    sBlock.appendChild(fBlock);
  });
  content.appendChild(sBlock);
});

function escHtml(str) {
  return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

// Search
const searchInput = document.getElementById("search");
const searchCount = document.getElementById("search-count");

searchInput.addEventListener("input", () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) {
    clearSearch();
    return;
  }
  let visible = 0;
  content.querySelectorAll(".prompt-card").forEach(card => {
    const text = card.dataset.prompt;
    if (text.includes(q)) {
      card.classList.remove("hidden");
      const raw = card.querySelector(".prompt-text").textContent;
      card.querySelector(".prompt-text").innerHTML = highlight(escHtml(raw), q);
      visible++;
    } else {
      card.classList.add("hidden");
    }
  });
  // show/hide file and section blocks
  content.querySelectorAll(".file-block").forEach(fb => {
    const anyVisible = fb.querySelectorAll(".prompt-card:not(.hidden)").length > 0;
    fb.style.display = anyVisible ? "" : "none";
  });
  content.querySelectorAll(".section-block").forEach(sb => {
    const anyVisible = sb.querySelectorAll(".file-block:not([style*='none'])").length > 0;
    sb.style.display = anyVisible ? "" : "none";
  });
  searchCount.textContent = visible + " of " + totalCount;
});

function clearSearch() {
  content.querySelectorAll(".prompt-card").forEach(card => {
    card.classList.remove("hidden");
    const raw = card.querySelector(".prompt-text").textContent;
    card.querySelector(".prompt-text").innerHTML = escHtml(raw);
  });
  content.querySelectorAll(".file-block, .section-block").forEach(el => {
    el.style.display = "";
  });
  searchCount.textContent = "";
}

function highlight(html, q) {
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return html.replace(new RegExp(escaped, "gi"), m => `<mark>${m}</mark>`);
}

// Active nav on scroll
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const fileId = e.target.id.replace("file-", "");
      document.querySelectorAll(".nav-item").forEach(n => n.classList.remove("active"));
      const active = document.querySelector(`.nav-item[data-file-id="${fileId}"]`);
      if (active) active.classList.add("active");
    }
  });
}, { rootMargin: "-20% 0px -70% 0px" });

document.querySelectorAll(".file-block").forEach(el => observer.observe(el));

// Toast
let toastTimer;
function showToast() {
  const toast = document.getElementById("toast");
  toast.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("show"), 1800);
}
</script>
